<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhalaria Brothers | Professional Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Retaining the "Down Code" Color Palette & Variables */
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bg-deep: #020617;
            --glass-bg: rgba(255, 255, 255, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --input-bg: #f8fafc;
            --error: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- FINTECH GRID OVERLAY --- */
        .tech-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* --- FLOATING ORBS --- */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: floatOrb 10s infinite ease-in-out alternate;
        }
        .orb-1 { width: 300px; height: 300px; background: #3b82f6; top: -50px; left: -50px; }
        .orb-2 { width: 200px; height: 200px; background: #6366f1; bottom: 50px; right: -50px; animation-delay: -2s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }

        .splash-logo-container {
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .splash-logo {
            width: 90px;
            height: auto;
            animation: rotateLogo 0.6s infinite linear; 
            filter: drop-shadow(0 10px 15px rgba(37, 99, 235, 0.3));
        }

        @keyframes rotateLogo {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .splash-text {
            font-size: 1.75rem;
            font-weight: 800;
            background: -webkit-linear-gradient(45deg, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            animation: fadeInUp 0.8s ease-out;
            text-transform: uppercase;
        }

        /* --- MAIN CARD --- */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.9);
            border-radius: 24px;
            padding: 60px 40px 40px 40px; 
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255,255,255,0.1) inset;
            position: relative;
            overflow: visible;
        }

        /* --- NEW FLOATING LOGO BADGE --- */
        .login-logo-badge {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            background: #ffffff;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.5);
            z-index: 20;
        }

        .login-logo {
            width: 55px;
            height: auto;
            display: block;
        }

        /* --- HEADER --- */
        .header-section {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-top: 10px;
        }

        .brand-pill {
            display: inline-flex;
            align-items: center;
            background: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            gap: 10px;
            margin: 0 auto; 
        }

        .brand-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-right: 8px;
            border-right: 1px solid #cbd5e1;
        }

        .brand-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- FORM --- */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            pointer-events: none;
            transition: color 0.2s;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-size: 1rem;
            background: var(--input-bg);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus {
            background: #fff;
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        input:focus + .input-icon {
            color: #3b82f6;
        }
        
        .input-wrapper:focus-within .input-icon {
            color: #2563eb;
        }

        /* --- BUTTON --- */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-gradient);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: wait;
            transform: none;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-submit:hover::after {
            left: 100%;
        }

        /* --- ERROR MSG (Integrated from Source 1) --- */
        .error-msg {
            margin-top: 16px;
            padding: 12px;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: var(--error);
            font-size: 0.875rem;
            border-radius: 10px;
            text-align: center;
            display: none; /* Hidden by default */
            font-weight: 500;
        }

        /* --- FOOTER --- */
        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .footer-logo {
            font-weight: 700;
            color: #0f172a;
        }

        .secure-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #059669;
            font-weight: 600;
            background: #ecfdf5;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="tech-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="https://i.postimg.cc/8Cmzk7WD/logo.png" alt="Logo" class="splash-logo">
        </div>
        <div class="splash-text">JHALARIA HOLDINGS</div>
    </div>

    <div class="login-wrapper" id="loginWrapper">
        <div class="glass-card">
            
            <div class="login-logo-badge">
                <img src="https://i.postimg.cc/8Cmzk7WD/logo.png" alt="QD" class="login-logo">
            </div>
            
            <div class="header-section">
                <h1 class="welcome-title">Welcome to<br>Jhalaria Holdings</h1>
                
                <div class="brand-pill">
                    <span class="brand-label">Strategic Initiative By</span>
                    <div class="brand-name">
                        Jhalaria Ventures
                        <span style="color:#cbd5e1; font-weight:300">|</span>
                        <span style="font-weight:400; font-size: 0.75rem; color:#64748b">Mandi Dabwali</span>
                    </div>
                </div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Operator ID</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="username" placeholder="Enter ID" autocomplete="off" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Security Key</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" placeholder="Enter Key" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Secure Login</button>
                
                <div id="errorMsg" class="error-msg">Credentials Rejected. Access Denied.</div>
            </form>

            <div class="footer">
                <div class="footer-text">
                    Powered by <span class="footer-logo">Jhalaria Ventures</span>
                </div>
                <div class="secure-tag">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C9.243 2 7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm0 2c1.654 0 3 1.346 3 3v3H9V7c0-1.654 1.346-3 3-3zm4 16H8v-8h8v8z"/></svg>
                    SSL Encrypted
                </div>
            </div>

        </div>
    </div>

    <script>
        // Combined Functionality: Splash Screen + Source 1 Authentication Logic
        
        // 1. Splash Screen Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const wrapper = document.getElementById('loginWrapper');
                
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                
                wrapper.style.opacity = '1';
                wrapper.style.transform = 'translateY(0)';
            }, 1000); 
        });

        // 2. Authentication Logic (Exactly as requested)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const error = document.getElementById('errorMsg');
            const originalText = btn.innerText;
            
            // Professional State Change
            btn.innerText = "Verifying...";
            btn.disabled = true;
            btn.style.opacity = "0.7";
            error.style.display = 'none';

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                // Sending credentials via query param to match original logic
                const response = await fetch(`/auth/login?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    // Slight delay for UX perception of security check
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 400);
                } else {
                    throw new Error('Auth failed');
                }
            } catch (err) {
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    error.style.display = 'block';
                }, 400);
            }
        });
    </script>
</body>
</html>
